# Name of the run. Used for output directory suffix and wandb.
name: pretrain_smri_mae

# Description of the run. Goes in wandb notes.
notes: null

# Root output directory.
# The run writes to checkpoints/<name> when name is set.
output_dir: checkpoints

# Standard 3D structural MRI volume size.
img_size: [208, 240, 208]
patch_size: 16

# Masking.
mask_ratio: 0.75
pred_mask_ratio: null
masking: null
masking_kwargs: {}

# Hybrid 3D masking example.
# masking: hybrid
# masking_kwargs:
#   block_size: [2, 2, 2]
#   random_fraction: 0.5
#   block_fraction: 0.5

# Model.
model: mae_vit_base
model_kwargs:
  # decoding mode: attn, cross, or crossreg.
  decoding: attn

  # target normalization: null/none, global, slice, or patch.
  target_norm: none

  no_decode_pos: false
  mask_drop_scale: false
  pred_edge_pad: 0

  class_token: true
  reg_tokens: 0
  no_embed_class: false

  decoder_depth: 4
  drop_path_rate: 0.0

# Datasets.
datasets:
  aabc_train:
    type: vol-wds
    url: datasets/aabc/aabc-{000000..000309}.tar
    shuffle: true
    buffer_size: 1000
    samples_per_epoch: 10000

  aabc_train_subset:
    type: vol-wds
    url: datasets/aabc/aabc-000000.tar
    shuffle: false
    samples_per_epoch: 16

  aabc_val:
    type: vol-wds
    url: datasets/aabc/aabc-000309.tar
    shuffle: false
    samples_per_epoch: 16

train_dataset: aabc_train
eval_datasets:
  - aabc_train_subset
  - aabc_val

# Data loader.
num_workers: 4
eval_num_workers: 0

# Optimization.
epochs: 400
batch_size: 1
accum_iter: 16

base_lr: 0.003
min_lr: 1e-6
warmup_epochs: 40
weight_decay: 0.05
betas: [0.9, 0.95]
clip_grad: 1.0

amp: true
amp_dtype: bfloat16

# Checkpointing.
ckpt: null
resume: false
auto_resume: true
start_epoch: 0
checkpoint_period: 1
max_checkpoints: 5

# Sync checkpoints to an R2 bucket using the AWS CLI.
r2_sync:
  url: null
  profile: null

device: cuda
distributed: false
seed: 7338
eval_seed: 7338
debug: false

wandb: false
wandb_entity: null
wandb_project: smri-fm
